<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <ul class="todo-list">
        <li>
            <input type="checkbox" id="explore-keyboard" />
        <label for="explore-keyboard"> Explore gaming keyboards</label>
        <ul class="sub-item">
            <li><a class="sub-item-link"  href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-stylized-to-do-list/build-a-stylized-to-do-list#" target="_blank">Store link</a></li>
        </ul>
        </li>


         <li>
            <input type="checkbox" id="finish-report" />
        <label for="finish-report"> Finish the report</label>
        <ul  class="sub-item">
            <li><a  class="sub-item-link"  href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-stylized-to-do-list/build-a-stylized-to-do-list#" target="_blank">Request Access</a></li>
        </ul>
        </li>



  <li>
            <input type="checkbox" id="phone-warranty" />
        <label for="phone-warranty">View Phone's Warranty</label>
        <ul class="sub-item">
            <li><a class="sub-item-link"  href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-stylized-to-do-list/build-a-stylized-to-do-list#" target="_blank">View Receipts</a></li>
        </ul>
        </li>



        <li>
            <input type="checkbox" id="processor-specs" />
        <label for="processor-specs">Check Processor Specs</label>
        <ul class="sub-item">
            <li><a  class="sub-item-link"  href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-stylized-to-do-list/build-a-stylized-to-do-list#" target="_blank" >View Model Number</a></li>
        </ul>
        </li>



    </ul>
</body>
