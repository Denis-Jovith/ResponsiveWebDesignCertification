<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id="title">freeCodeCamp Survey Form</h1>
    <p id="description">Thank you for taking the time to help us improve the platform</p>
    <form id="survey-form">
      <label for="name" id="name-label" >Name : </label>
      <input type="text" id="name" placeholder="eg. Denis Jb" required/>
      <br/>
      <label for="email" id="email-label">Email : </label>
      <input type="email" id="email" placeholder="eg. denis@gmail.com" required/>
      <br>
      <label for="number" id="number-label">Age : </label>
      <input type="number" id="number" placeholder="eg. 23" required min="3" max="10"/>
      <br/>
      <br/>
      <legend>Which option best describes your current role?</legend>
      <select id="dropdown">
        <option name="dropdown">Select current role             </option>
        <option name="dropdown">Student             </option>
        <option name="dropdown">Full Time Job             </option>
        <option name="dropdown">Full Time Learner</option>
        <option name="dropdown">Prefer not to say             </option>
         <option name="dropdown">Others</option>
      </select>
      <br/>
      <br/>
      <legend>Would you recommend freeCodeCamp to a friend?</legend>
      <input type="radio" id="definitely" name="reccomendation" value="definitely">
      <label for="definitely">Definitely </label>
     <input type="radio" id="maybe" name="reccomendation" value="maybe">
      <label for="maybe">Maybe </label>
       <input type="radio" id="not-sure" name="reccomendation" value="not-sure">
      <label for="not-sure">Not Sure </label>
      <br/>
      <br/>
      <legend>What is your favorite feature of freeCodeCamp?</legend>
      <input type="radio" id="select-option" name="favourite" value="Select an option">
<label for="select-option">Select an option</label>

<input type="radio" id="challenges" name="favourite" value="Challenges">
<label for="challenges">Challenges</label>

<input type="radio" id="projects" name="favourite" value="Projects">
<label for="projects">Projects</label>

<input type="radio" id="community" name="favourite" value="Community">
<label for="community">Community</label>

<input type="radio" id="opensource" name="favourite" value="Open Source">
<label for="opensource">Open Source</label>
      <br/>
      <br/>
      <legend>What would you like to see improved? (Check all that apply)</legend>
       <input type="checkbox" id="frontend" name="improves" value="Front-end Projects">
<label for="frontend">Front-end Projects</label>

<input type="checkbox" id="backend" name="improves" value="Back-end Projects">
<label for="backend">Back-end Projects</label>

<input type="checkbox" id="datavisualization" name="improves" value="Data Visualization Challenges">
<label for="datavisualization">Data Visualization Challenges</label>

<input type="checkbox" id="opensource" name="improves" value="Open Source Community">
<label for="opensource">Open Source Community</label>

<input type="checkbox" id="gitter" name="improves" value="Gitter Help Rooms">
<label for="gitter">Gitter Help Rooms</label>

<input type="checkbox" id="videos" name="improves" value="Videos">
<label for="videos">Videos</label>

<input type="checkbox" id="meetups" name="improves" value="City Meetups">
<label for="meetups">City Meetups</label>

<input type="checkbox" id="wiki" name="improves" value="Wiki">
<label for="wiki">Wiki</label>

<input type="checkbox" id="forum" name="improves" value="Forum">
<label for="forum">Forum</label>

<input type="checkbox" id="courses" name="improves" value="Additional Courses">
<label for="courses">Additional Courses</label>
<br/>
<br/>
<textarea rows="5" cols="30"></textarea>
<br/>
<button id=submit value="submit">Submit</button>
    </form>
  </body>
</html>
