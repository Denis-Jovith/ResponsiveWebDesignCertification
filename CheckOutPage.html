<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
</head>

<body>
    <h1>Checkout</h1>
    <section>
        <h2>Your Cart</h2>
        <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="image"/>
        </section>
    <section>
        <h2>Payment Information</h2>
        <form>
            <label for="card-name">Card Name  <span aria-hidden="true" >*</span></label> <input required id="card-name" name="card-name" type="text" />
            <label for="card-number">Card Number <span aria-hidden="true" >*</span></label> <input aria-describedby="card-number-help" required id="card-number" name="card-number" type="text" />
            <p id="card-number-help">5830--3-</p>
        </form>
           
    </section>
</body>

</html>
